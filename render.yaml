services:
  - type: web
    name: explainmycode-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/ready
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: explainmycode-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: explainmycode-cache
          property: connectionString
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: REMEMBER_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: RUN_DB_MIGRATIONS
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: LLM_MODE
        value: live
      - key: GROQ_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: EXECUTION_PROVIDER_ORDER
        value: judge0,onecompiler,compiler-io
      - key: ONECOMPILER_API_KEY
        value: ""
      - key: COMPILER_IO_API_KEY
        value: ""
      - key: JUDGE0_BASE_URL
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
  - type: keyvalue
    name: explainmycode-cache
    ipAllowList: []

databases:
  - name: explainmycode-db
